<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="robots" content="noindex,nofollow" />
<link rel="icon" href="data:," />
<title>Claude 用量</title>
<style>
  :root {
    color-scheme: dark;
    --bg-0: #020617;
    --bg-1: #07111f;
    --surface-0: rgba(15, 23, 42, 0.72);
    --surface-1: rgba(15, 23, 42, 0.88);
    --surface-2: rgba(30, 41, 59, 0.46);
    --surface-3: rgba(51, 65, 85, 0.58);
    --line-0: rgba(148, 163, 184, 0.14);
    --line-1: rgba(148, 163, 184, 0.24);
    --text-0: #f8fafc;
    --text-1: #cbd5e1;
    --text-2: #94a3b8;
    --text-3: #64748b;
    --primary: #14b8a6;
    --primary-strong: #2dd4bf;
    --low: #2dd4bf;
    --mid: #f59e0b;
    --high: #fb7185;
    --danger: #f43f5e;
    --radius-panel: 24px;
    --radius-card: 16px;
    --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
    font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  }

  * { box-sizing: border-box; }

  html { min-height: 100%; }

  body {
    min-height: 100dvh;
    margin: 0;
    display: grid;
    place-items: center;
    overflow-x: hidden;
    padding: max(20px, env(safe-area-inset-top)) max(18px, env(safe-area-inset-right)) max(20px, env(safe-area-inset-bottom)) max(18px, env(safe-area-inset-left));
    background:
      radial-gradient(900px 540px at 50% -12%, rgba(20, 184, 166, 0.18), transparent 58%),
      radial-gradient(720px 520px at 96% 106%, rgba(15, 23, 42, 0.95), transparent 62%),
      linear-gradient(145deg, var(--bg-0) 0%, var(--bg-1) 48%, #02040a 100%);
    color: var(--text-0);
    text-rendering: geometricPrecision;
    -webkit-font-smoothing: antialiased;
  }

  body::before,
  body::after {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
  }

  body::before {
    background: radial-gradient(circle at center, transparent 42%, rgba(2, 6, 23, 0.72) 100%);
  }

  body::after {
    opacity: 0.075;
    background-image: radial-gradient(rgba(226, 232, 240, 0.8) 0.8px, transparent 0.8px);
    background-size: 22px 22px;
    mask-image: radial-gradient(circle at center, black 0%, transparent 72%);
  }

  button {
    font: inherit;
  }

  .dashboard {
    position: relative;
    z-index: 1;
    width: min(100%, 900px);
  }

  .panel {
    position: relative;
    overflow: hidden;
    border-radius: var(--radius-panel);
    background:
      linear-gradient(180deg, rgba(15, 23, 42, 0.92), rgba(15, 23, 42, 0.76)),
      var(--surface-0);
    border: 1px solid var(--line-0);
    box-shadow: 0 8px 12px rgba(0, 0, 0, 0.34), inset 0 1px 0 rgba(255, 255, 255, 0.05);
    padding: 28px;
  }

  .panel::before {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
    background:
      radial-gradient(560px 240px at 50% 0%, rgba(20, 184, 166, 0.1), transparent 68%),
      linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.035), transparent);
  }

  .content {
    position: relative;
    z-index: 1;
  }

  .topbar {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 18px;
    margin-bottom: 26px;
  }

  .account {
    margin: 0 0 8px;
    color: var(--primary-strong);
    font-size: 0.78rem;
    font-weight: 800;
    letter-spacing: 0.16em;
    line-height: 1.2;
    text-transform: uppercase;
  }

  h1 {
    margin: 0;
    color: var(--text-0);
    font-size: 1.72rem;
    line-height: 1.12;
    letter-spacing: -0.025em;
    text-wrap: balance;
  }

  .summary {
    margin: 8px 0 0;
    max-width: 62ch;
    color: var(--text-2);
    font-size: 0.9rem;
    line-height: 1.55;
  }

  .status-pill {
    display: inline-flex;
    min-height: 36px;
    align-items: center;
    gap: 8px;
    border-radius: 999px;
    border: 1px solid var(--line-1);
    background: rgba(15, 23, 42, 0.72);
    padding: 8px 12px;
    color: var(--text-1);
    font-size: 0.78rem;
    font-weight: 700;
    white-space: nowrap;
  }

  .status-dot {
    width: 7px;
    height: 7px;
    border-radius: 999px;
    background: var(--primary-strong);
    box-shadow: 0 0 0 4px rgba(45, 212, 191, 0.12);
  }

  .status-pill.is-error .status-dot {
    background: var(--danger);
    box-shadow: 0 0 0 4px rgba(244, 63, 94, 0.12);
  }

  .gauges {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 18px;
  }

  .gauge-card {
    --gauge-color: var(--low);
    position: relative;
    min-width: 0;
    overflow: hidden;
    border-radius: var(--radius-card);
    background:
      linear-gradient(180deg, rgba(30, 41, 59, 0.58), rgba(15, 23, 42, 0.62)),
      var(--surface-2);
    border: 1px solid var(--line-0);
    padding: 18px 16px 16px;
  }

  .gauge-card::before {
    content: "";
    position: absolute;
    inset: 0;
    background: radial-gradient(220px 140px at 50% 0%, color-mix(in srgb, var(--gauge-color) 18%, transparent), transparent 70%);
    opacity: 0.95;
    pointer-events: none;
  }

  .gauge-head,
  .ring-wrap,
  .reset,
  .window-state {
    position: relative;
    z-index: 1;
  }

  .gauge-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 10px;
  }

  .window {
    color: var(--text-0);
    font-size: 1.05rem;
    font-weight: 800;
    letter-spacing: -0.015em;
  }

  .window-meta {
    color: var(--text-3);
    font-size: 0.74rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .ring-wrap {
    width: min(100%, 238px);
    margin: 0 auto;
    display: grid;
    place-items: center;
  }

  .ring {
    width: 100%;
    aspect-ratio: 1;
    overflow: visible;
  }

  .ring-track {
    fill: none;
    stroke: rgba(100, 116, 139, 0.24);
    stroke-width: 10;
  }

  .ring-progress {
    fill: none;
    stroke: var(--gauge-color);
    stroke-width: 10;
    stroke-linecap: round;
    stroke-dasharray: 100;
    stroke-dashoffset: 100;
    transform: rotate(-90deg);
    transform-origin: 50% 50%;
    transition: stroke 180ms ease;
  }

  .ring-core {
    fill: rgba(2, 6, 23, 0.28);
    stroke: rgba(148, 163, 184, 0.08);
  }

  .ring-value {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    color: var(--gauge-color);
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.035em;
  }

  .value {
    min-width: 2.2ch;
    text-align: center;
    font-size: 2.82rem;
    font-weight: 850;
    line-height: 1;
  }

  .unit {
    color: color-mix(in srgb, var(--gauge-color) 72%, var(--text-1));
    font-size: 1.02rem;
    font-weight: 800;
    line-height: 1;
    transform: translateY(0.14em);
  }

  .reset {
    margin: 10px 0 0;
    min-height: 1.35em;
    color: var(--text-1);
    font-size: 0.9rem;
    font-weight: 650;
    text-align: center;
    font-variant-numeric: tabular-nums;
  }

  .window-state {
    margin: 5px 0 0;
    color: var(--text-3);
    font-size: 0.75rem;
    font-weight: 700;
    text-align: center;
  }

  .gauge-card.state-mid { --gauge-color: var(--mid); }
  .gauge-card.state-high { --gauge-color: var(--high); }
  .gauge-card.is-empty { --gauge-color: var(--text-3); }
  .gauge-card.is-empty .ring-progress { stroke: rgba(100, 116, 139, 0.3); }
  .gauge-card.is-empty .unit { display: none; }
  .gauge-card.is-empty .value { color: var(--text-3); }

  .alert {
    display: none;
    margin-top: 18px;
    border-radius: 14px;
    border: 1px solid rgba(244, 63, 94, 0.26);
    background: rgba(127, 29, 29, 0.22);
    padding: 10px 12px;
    color: #fecdd3;
    font-size: 0.86rem;
    line-height: 1.45;
  }

  .alert.is-visible { display: block; }

  .footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 14px;
    margin-top: 20px;
    border-top: 1px solid var(--line-0);
    padding-top: 18px;
  }

  .meta-row {
    display: flex;
    min-width: 0;
    flex-wrap: wrap;
    align-items: center;
    gap: 8px;
    color: var(--text-2);
    font-size: 0.82rem;
    line-height: 1.4;
  }

  .source {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    color: var(--text-1);
    font-weight: 700;
  }

  .source::before {
    content: "";
    width: 6px;
    height: 6px;
    border-radius: 999px;
    background: var(--primary-strong);
  }

  .dot-sep {
    width: 3px;
    height: 3px;
    border-radius: 999px;
    background: rgba(148, 163, 184, 0.5);
  }

  .refresh {
    position: relative;
    min-height: 44px;
    border: 0;
    border-radius: 12px;
    background: linear-gradient(135deg, #14b8a6, #0d9488);
    color: white;
    cursor: pointer;
    padding: 0 18px;
    font-size: 0.9rem;
    font-weight: 800;
    letter-spacing: 0.02em;
    transition: transform 160ms var(--ease-out), opacity 160ms ease, background 160ms ease;
  }

  .refresh:hover { transform: translateY(-1px); }
  .refresh:active { transform: translateY(0) scale(0.98); }
  .refresh:focus-visible { outline: 2px solid rgba(45, 212, 191, 0.7); outline-offset: 3px; }
  .refresh:disabled { cursor: progress; opacity: 0.62; transform: none; }

  .refresh .loading-mark {
    display: none;
    width: 13px;
    height: 13px;
    margin-right: 7px;
    border-radius: 999px;
    border: 2px solid rgba(255, 255, 255, 0.38);
    border-top-color: white;
    vertical-align: -2px;
    animation: spin 800ms linear infinite;
  }

  .refresh.is-loading .loading-mark { display: inline-block; }

  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 620px) {
    body { align-items: start; padding-top: max(18px, env(safe-area-inset-top)); }
    .panel { padding: 20px; border-radius: 20px; }
    .topbar { flex-direction: column; margin-bottom: 20px; }
    h1 { font-size: 1.45rem; }
    .summary { font-size: 0.86rem; }
    .gauges { grid-template-columns: 1fr; gap: 14px; }
    .gauge-card { padding: 16px 14px 15px; }
    .ring-wrap { width: min(100%, 224px); }
    .footer { align-items: stretch; flex-direction: column; }
    .refresh { width: 100%; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 1ms;
      animation-iteration-count: 1;
      scroll-behavior: auto;
      transition-duration: 1ms;
    }
  }
</style>
</head>
<body>
  <main class="dashboard" aria-labelledby="title">
    <section class="panel">
      <div class="content">
        <header class="topbar">
          <div>
            <p class="account" id="acct">CLAUDE</p>
            <h1 id="title">滚动用量窗口</h1>
            <p class="summary">5 小时与 7 天窗口的 Anthropic 限额占用。</p>
          </div>
          <div class="status-pill" id="statusPill" aria-live="polite">
            <span class="status-dot" aria-hidden="true"></span>
            <span id="statusText">载入中</span>
          </div>
        </header>

        <div class="gauges" aria-live="polite">
          <article class="gauge-card is-empty" id="card-five" aria-label="5 小时窗口用量">
            <div class="gauge-head">
              <span class="window">5h</span>
              <span class="window-meta">5 hour</span>
            </div>
            <div class="ring-wrap">
              <svg class="ring" viewBox="0 0 180 180" role="img" aria-hidden="true">
                <circle class="ring-core" cx="90" cy="90" r="48"></circle>
                <circle class="ring-track" cx="90" cy="90" r="68" pathLength="100"></circle>
                <circle class="ring-progress" id="arc-five" cx="90" cy="90" r="68" pathLength="100"></circle>
              </svg>
              <div class="ring-value">
                <span class="value" id="value-five">—</span>
                <span class="unit" id="unit-five">%</span>
              </div>
            </div>
            <p class="reset" id="reset-five">—</p>
            <p class="window-state" id="state-five">等待采样</p>
          </article>

          <article class="gauge-card is-empty" id="card-seven" aria-label="7 天窗口用量">
            <div class="gauge-head">
              <span class="window">7d</span>
              <span class="window-meta">7 day</span>
            </div>
            <div class="ring-wrap">
              <svg class="ring" viewBox="0 0 180 180" role="img" aria-hidden="true">
                <circle class="ring-core" cx="90" cy="90" r="48"></circle>
                <circle class="ring-track" cx="90" cy="90" r="68" pathLength="100"></circle>
                <circle class="ring-progress" id="arc-seven" cx="90" cy="90" r="68" pathLength="100"></circle>
              </svg>
              <div class="ring-value">
                <span class="value" id="value-seven">—</span>
                <span class="unit" id="unit-seven">%</span>
              </div>
            </div>
            <p class="reset" id="reset-seven">—</p>
            <p class="window-state" id="state-seven">等待采样</p>
          </article>
        </div>

        <div class="alert" id="err" role="status"></div>

        <footer class="footer">
          <div class="meta-row">
            <span class="source" id="src">被动采样</span>
            <span class="dot-sep" aria-hidden="true"></span>
            <span id="updated">尚未采样</span>
          </div>
          <button class="refresh" id="q" type="button" aria-label="主动查询用量">
            <span class="loading-mark" aria-hidden="true"></span><span id="qText">查询</span>
          </button>
        </footer>
      </div>
    </section>
  </main>

<script nonce="__CSP_NONCE_VALUE__">
(() => {
  var tok = new URLSearchParams(location.search).get('token');
  var base = '/pulse/api/usage';
  var reduceMotion = window.matchMedia ? window.matchMedia('(prefers-reduced-motion: reduce)').matches : false;
  var timer = null;
  var clockTimer = null;
  var busy = false;
  var lastData = null;
  var gaugeState = {
    five: { raw: 0, arc: 0, raf: 0 },
    seven: { raw: 0, arc: 0, raf: 0 }
  };

  var el = {
    acct: document.getElementById('acct'),
    statusPill: document.getElementById('statusPill'),
    statusText: document.getElementById('statusText'),
    err: document.getElementById('err'),
    src: document.getElementById('src'),
    updated: document.getElementById('updated'),
    button: document.getElementById('q'),
    buttonText: document.getElementById('qText'),
    five: {
      card: document.getElementById('card-five'),
      arc: document.getElementById('arc-five'),
      value: document.getElementById('value-five'),
      reset: document.getElementById('reset-five'),
      state: document.getElementById('state-five')
    },
    seven: {
      card: document.getElementById('card-seven'),
      arc: document.getElementById('arc-seven'),
      value: document.getElementById('value-seven'),
      reset: document.getElementById('reset-seven'),
      state: document.getElementById('state-seven')
    }
  };

  function url(refresh) {
    var q = [];
    if (tok) q.push(`token=${encodeURIComponent(tok)}`);
    if (refresh) q.push('refresh=1');
    return `${base}${q.length ? `?${q.join('&')}` : ''}`;
  }

  function clampArc(value) {
    if (value == null || !Number.isFinite(value)) return 0;
    return Math.max(0, Math.min(100, value));
  }

  function roundedPercent(value) {
    if (value == null || !Number.isFinite(value)) return 0;
    return Math.round(value);
  }

  function tone(value) {
    if (value >= 80) return 'high';
    if (value >= 55) return 'mid';
    return 'low';
  }

  function fmtRemain(sec) {
    if (sec == null || !Number.isFinite(sec)) return '';
    if (sec <= 0) return '重置中';
    var d = Math.floor(sec / 86400);
    var h = Math.floor((sec % 86400) / 3600);
    var m = Math.floor((sec % 3600) / 60);
    if (d > 0) return `${d}d ${h}h`;
    if (h > 0) return `${h}h ${m}m`;
    return `${Math.max(1, m)}m`;
  }

  function fmtUpdated(value) {
    if (!value) return '尚未采样';
    var time = Date.parse(value);
    if (!Number.isFinite(time)) return '时间未知';
    var diff = Math.max(0, Date.now() - time);
    var min = Math.floor(diff / 60000);
    if (min < 1) return '刚刚';
    if (min < 60) return `${min} 分钟前`;
    var h = Math.floor(min / 60);
    if (h < 24) return `${h} 小时前`;
    return `${Math.floor(h / 24)} 天前`;
  }

  function sourceLabel(value) {
    return value === 'active' ? '主动查询' : '被动采样';
  }

  function setError(message) {
    el.err.textContent = message || '';
    el.err.classList.toggle('is-visible', Boolean(message));
    el.statusPill.classList.toggle('is-error', Boolean(message));
    el.statusText.textContent = message ? '加载失败' : '已同步';
  }

  function setButtonLoading(active) {
    el.button.disabled = active;
    el.button.classList.toggle('is-loading', active);
    el.buttonText.textContent = active ? '查询中' : '查询';
  }

  function setGaugeVisual(key, raw, arc) {
    var g = el[key];
    g.value.textContent = String(Math.round(raw));
    g.arc.style.strokeDashoffset = String(100 - clampArc(arc));
    gaugeState[key].raw = raw;
    gaugeState[key].arc = arc;
  }

  function animateGauge(key, targetRaw, targetArc) {
    var state = gaugeState[key];
    if (state.raf) cancelAnimationFrame(state.raf);
    if (reduceMotion) {
      setGaugeVisual(key, targetRaw, targetArc);
      return;
    }

    var startRaw = state.raw;
    var startArc = state.arc;
    var start = performance.now();
    var duration = 780;

    function step(now) {
      var p = Math.min(1, (now - start) / duration);
      var eased = 1 - (1 - p) ** 3;
      setGaugeVisual(
        key,
        startRaw + (targetRaw - startRaw) * eased,
        startArc + (targetArc - startArc) * eased
      );
      if (p < 1) {
        state.raf = requestAnimationFrame(step);
      } else {
        state.raf = 0;
        setGaugeVisual(key, targetRaw, targetArc);
      }
    }
    state.raf = requestAnimationFrame(step);
  }

  function renderGauge(key, data) {
    var g = el[key];
    g.card.classList.remove('state-low', 'state-mid', 'state-high', 'is-empty');

    if (!data) {
      if (gaugeState[key].raf) cancelAnimationFrame(gaugeState[key].raf);
      gaugeState[key].raf = 0;
      gaugeState[key].raw = 0;
      gaugeState[key].arc = 0;
      g.card.classList.add('is-empty');
      g.value.textContent = '—';
      g.arc.style.strokeDashoffset = '100';
      g.reset.textContent = '—';
      g.state.textContent = '暂无窗口数据';
      return;
    }

    var raw = roundedPercent(Number(data.utilization));
    var arc = clampArc(Number(data.utilization));
    g.card.classList.add(`state-${tone(raw)}`);
    g.reset.textContent = data.remaining_seconds == null ? '—' : `重置 ${fmtRemain(Number(data.remaining_seconds))}`;
    g.state.textContent = raw >= 100 ? '已触顶' : raw >= 80 ? '高占用' : raw >= 55 ? '接近上限' : '余量充足';
    animateGauge(key, raw, arc);
  }

  function updateCountdowns() {
    if (!lastData) return;
    el.updated.textContent = fmtUpdated(lastData.updated_at);
    updateResetLabel('five', lastData.five_hour);
    updateResetLabel('seven', lastData.seven_day);
  }

  function updateResetLabel(key, data) {
    if (!data) return;
    if (data._deadline == null) {
      el[key].reset.textContent = data.remaining_seconds == null ? '—' : `重置 ${fmtRemain(Number(data.remaining_seconds))}`;
      return;
    }
    var remaining = Math.ceil((data._deadline - Date.now()) / 1000);
    el[key].reset.textContent = `重置 ${fmtRemain(remaining)}`;
  }

  function attachDeadlines(data) {
    ['five_hour', 'seven_day'].forEach((key) => {
      if (data[key] && data[key].remaining_seconds != null && Number.isFinite(Number(data[key].remaining_seconds))) {
        data[key]._deadline = Date.now() + Number(data[key].remaining_seconds) * 1000;
      }
    });
    return data;
  }

  function render(data) {
    lastData = attachDeadlines(data || {});
    el.acct.textContent = (lastData.account_label || 'claude').toUpperCase();
    el.src.textContent = sourceLabel(lastData.source);
    el.updated.textContent = fmtUpdated(lastData.updated_at);
    renderGauge('five', lastData.five_hour);
    renderGauge('seven', lastData.seven_day);
    setError(lastData.error || '');
  }

  function renderHardError(message) {
    lastData = null;
    el.acct.textContent = 'CLAUDE';
    el.src.textContent = '加载失败';
    el.updated.textContent = message;
    renderGauge('five', null);
    renderGauge('seven', null);
    setError(message);
  }

  function load(refresh) {
    if (busy) return;
    var requestError;
    busy = true;
    if (refresh) setButtonLoading(true);

    fetch(url(refresh), { headers: { 'Accept': 'application/json' } })
      .then((response) => {
        return response.json().catch(() => ({})).then((body) => {
          if (!response.ok) {
            requestError = new Error(response.status === 401 ? '未授权 / 加载失败' : '加载失败');
            requestError.body = body;
            throw requestError;
          }
          return body;
        });
      })
      .then(render)
      .catch((error) => {
        renderHardError(String(error?.message ? error.message : error));
      })
      .finally(() => {
        busy = false;
        if (refresh) setButtonLoading(false);
      });
  }

  function start() {
    if (!timer) {
      load(false);
      timer = setInterval(() => { load(false); }, 30000);
    }
    if (!clockTimer) {
      clockTimer = setInterval(updateCountdowns, 1000);
    }
  }

  function stop() {
    if (timer) {
      clearInterval(timer);
      timer = null;
    }
    if (clockTimer) {
      clearInterval(clockTimer);
      clockTimer = null;
    }
  }

  el.button.addEventListener('click', () => { load(true); });
  document.addEventListener('visibilitychange', () => { document.hidden ? stop() : start(); });
  if (!document.hidden) start();
})();
</script>
</body>
</html>
